# Large-scale Mirrorview ingestion: 73 keywords, up to 200 posts per keyword, 10k row cap.
# Separate from mirrorview.yaml (pilot collection) via dataset_id.
dataset_id: twitter_a8f3c22d-6b14-4e9a-9d2f-1c7e5a9b3d48
name: mirrorview_scale
description: Mirrorview scale collection — individual keyword queries, 200 posts each
date: "2026-06-01"
record_types:
  - twitter.tweet
ingestion_params:
  max_rows: 10000
  limit_per_keyword: 200
  lang: en
  exclude:
    - reply
    - retweet
    - quote
  dedupe_tweets_from_prior_raw_runs: true
  keyword:
    # gun_control
    - gun control
    - gun rights
    - second amendment
    - gun violence
    - gun safety
    - firearm
    - gun laws
    - gun reform
    - background checks
    - assault weapon
    - mass shooting
    - NRA
    - gun ban
    - open carry
    - concealed carry
    - red flag laws
    # climate_change
    - climate change
    - global warming
    - climate crisis
    - climate action
    - carbon emissions
    - greenhouse gases
    - fossil fuels
    - renewable energy
    - climate policy
    - Paris agreement
    - carbon tax
    - green new deal
    - climate science
    - global temperature
    - sea level rise
    - carbon footprint
    - clean energy
    - climate denial
    # abortion
    - abortion
    - reproductive rights
    - pro-choice
    - pro-life
    - roe v wade
    - planned parenthood
    - abortion rights
    - abortion ban
    - abortion access
    - reproductive health
    - fetal rights
    - women's rights
    - abortion clinic
    - late term abortion
    - abortion pill
    - heartbeat bill
    - abortion law
    - reproductive freedom
    - right to choose
    # immigration
    - immigration
    - border security
    - illegal immigration
    - immigration reform
    - deportation
    - ICE
    - border wall
    - asylum
    - refugees
    - DACA
    - green card
    - citizenship
    - immigration policy
    - border patrol
    - undocumented immigrants
    - visa
    - sanctuary cities
    - border crisis
    - migrant
    - immigration detention
