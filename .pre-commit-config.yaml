default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.9
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.409
    hooks:
      - id: pyright
        exclude: ^experimentation/

  - repo: https://github.com/rohaquinlop/complexipy-pre-commit
    rev: v5.1.0
    hooks:
      - id: complexipy
        types_or: [python, pyi]

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.14
    hooks:
      - id: vulture
        pass_filenames: false

  - repo: https://github.com/biomejs/pre-commit
    rev: v1.8.3
    hooks:
      - id: biome-check
        additional_dependencies: ["@biomejs/biome@1.8.3"]
        files: ^ui/

  - repo: local
    hooks:
      - id: doctoc
        name: Update markdown TOCs (doctoc)
        entry: bash scripts/update_doc_tocs.sh
        language: node
        additional_dependencies: ["doctoc@2"]
        files: ^(docs/adrs|docs/design_docs|strategy_planning)/.+\.md$
        pass_filenames: true
