[project]
name = "lab-data-integrations-interface"
version = "0.1.0"
description = "Add your description here"
requires-python = ">=3.11,<3.12"
dependencies = [
    "atproto>=0.0.65",
    "python-dotenv>=1.2.2",
]

[dependency-groups]
dev = [
    "complexipy>=5.1.0",
    "pre-commit>=4.0.0",
    "pyright>=1.1.400",
    "ruff>=0.9.0",
]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "standard"
venvPath = "."
venv = ".venv"
